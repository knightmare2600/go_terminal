name: Build go_terminal binaries

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        goos: [linux, windows]
        goarch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'

      # 🔧 Fix legacy repo (no go.mod)
      - name: Prepare Go module
        run: |
          if [ ! -f go.mod ]; then
            echo "Initializing Go module..."
            go mod init go_terminal
          fi
          go mod tidy

      # 🔨 Build binaries
      - name: Build
        run: |
          mkdir -p dist

          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".exe"
          fi

          echo "Building for ${{ matrix.goos }}-${{ matrix.goarch }}..."

          CGO_ENABLED=0 \
          GOOS=${{ matrix.goos }} \
          GOARCH=${{ matrix.goarch }} \
          go build -v -o dist/go_terminal-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}

      # 📦 Upload artifacts (one per platform)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: go_terminal-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/go_terminal-${{ matrix.goos }}-${{ matrix.goarch }}*
