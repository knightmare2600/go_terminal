name: Build go_terminal binaries

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        goos: [linux, windows]
        goarch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'

      # 🔍 Move into actual source dir
      - name: Detect source directory
        id: src
        run: |
          if [ -d "./src/go_terminal" ]; then
            echo "dir=src/go_terminal" >> $GITHUB_OUTPUT
          else
            echo "dir=." >> $GITHUB_OUTPUT
          fi

      # 🔧 Init module INSIDE the correct dir
      - name: Prepare Go module
        working-directory: ${{ steps.src.outputs.dir }}
        run: |
          if [ ! -f go.mod ]; then
            go mod init go_terminal
          fi
          go mod tidy

      # 🔨 Build
      - name: Build
        working-directory: ${{ steps.src.outputs.dir }}
        run: |
          mkdir -p ../../dist

          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".exe"
          fi

          echo "Building for ${{ matrix.goos }}-${{ matrix.goarch }}..."

          CGO_ENABLED=0 \
          GOOS=${{ matrix.goos }} \
          GOARCH=${{ matrix.goarch }} \
          go build -v \
            -o ../../dist/go_terminal-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}

      # 📦 Upload
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: go_terminal-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/go_terminal-${{ matrix.goos }}-${{ matrix.goarch }}*
