name: Build go_terminal

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  APP_ID: uk.example.go_terminal
  APP_NAME: go_terminal

jobs:

  build-linux-windows:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'

      - name: Install fyne-cross
        run: go install github.com/fyne-io/fyne-cross@latest

      - name: Prepare module
        working-directory: src/go_terminal
        run: |
          if [ ! -f go.mod ]; then
            go mod init go_terminal
          fi
          go mod tidy

      # =========================
      # 🐧 Linux builds
      # =========================
      - name: Build Linux
        working-directory: src/go_terminal
        run: |
          fyne-cross linux -arch=amd64,arm64 --app-id $APP_ID

      # =========================
      # 🪟 Windows builds
      # =========================
      - name: Build Windows
        working-directory: src/go_terminal
        run: |
          fyne-cross windows -arch=amd64,arm64 --app-id $APP_ID

      # =========================
      # 📦 Collect + rename outputs
      # =========================
      - name: Collect artifacts
        run: |
          mkdir -p dist

          find src/go_terminal/fyne-cross/dist -type f | while read f; do
            case "$f" in
              *linux-amd64*)   out="${APP_NAME}-linux-amd64" ;;
              *linux-arm64*)   out="${APP_NAME}-linux-arm64" ;;
              *windows-amd64*) out="${APP_NAME}-windows-amd64.exe" ;;
              *windows-arm64*) out="${APP_NAME}-windows-arm64.exe" ;;
              *) continue ;;
            esac

            echo "Copy: $f -> dist/$out"
            cp "$f" "dist/$out" || true
          done

      # =========================
      # 📦 ZIP everything
      # =========================
      - name: Create ZIP bundle
        run: |
          cd dist
          zip -r ../go_terminal-binaries.zip .

      # =========================
      # 📤 Upload single artifact
      # =========================
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: go_terminal-all-platforms
          path: go_terminal-binaries.zip
