name: Build go_terminal (fyne-cross)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  APP_ID: uk.example.go_terminal
  APP_NAME: go_terminal

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'

      - name: Install fyne-cross
        run: go install github.com/fyne-io/fyne-cross@latest

      - name: Prepare Go module
        run: |
          if [ ! -f go.mod ]; then
            go mod init go_terminal
          fi
          go mod tidy

      - name: Detect source dir
        id: src
        run: |
          if [ -d "./src/go_terminal" ]; then
            echo "dir=src/go_terminal" >> $GITHUB_OUTPUT
          else
            echo "dir=." >> $GITHUB_OUTPUT
          fi

      # 🐧 Linux
      - name: Build Linux
        working-directory: ${{ steps.src.outputs.dir }}
        run: |
          fyne-cross linux -arch=amd64,arm64 --app-id $APP_ID

      # 🪟 Windows
      - name: Build Windows
        working-directory: ${{ steps.src.outputs.dir }}
        run: |
          fyne-cross windows -arch=amd64,arm64 --app-id $APP_ID

      # 🍎 macOS
      - name: Build macOS
        working-directory: ${{ steps.src.outputs.dir }}
        run: |
          fyne-cross darwin -arch=amd64,arm64 --app-id $APP_ID

      # 📦 Collect + rename EVERYTHING properly
      - name: Collect and rename artifacts
        run: |
          mkdir -p dist

          echo "Collecting build outputs..."

          # Copy everything relevant (binaries + zips)
          find . -type f \( -name "*.exe" -o -name "*.app" -o -name "*.tar.gz" -o -name "*.zip" -o -name "${APP_NAME}" \
          \) | while read file; do

            filename=$(basename "$file")

            # Detect platform + arch from path
            if [[ "$file" == *windows-amd64* ]]; then
              suffix="windows-amd64"
            elif [[ "$file" == *windows-arm64* ]]; then
              suffix="windows-arm64"
            elif [[ "$file" == *linux-amd64* ]]; then
              suffix="linux-amd64"
            elif [[ "$file" == *linux-arm64* ]]; then
              suffix="linux-arm64"
            elif [[ "$file" == *darwin-amd64* ]]; then
              suffix="darwin-amd64"
            elif [[ "$file" == *darwin-arm64* ]]; then
              suffix="darwin-arm64"
            else
              suffix="unknown"
            fi

            ext=""
            case "$filename" in
              *.exe) ext=".exe" ;;
              *.zip) ext=".zip" ;;
              *.tar.gz) ext=".tar.gz" ;;
              *.app) ext=".app" ;;
            esac

            newname="${APP_NAME}-${suffix}${ext}"

            echo "→ $file -> dist/$newname"
            cp "$file" "dist/$newname" || true
          done

      # 📤 Upload EVERYTHING
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: go_terminal-all-platforms
          path: dist/
