name: Build go_terminal (fyne-cross)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'

      # 🔧 Install fyne-cross
      - name: Install fyne-cross
        run: |
          go install github.com/fyne-io/fyne-cross@latest

      # 🔧 Ensure module exists (repo is legacy)
      - name: Prepare Go module
        run: |
          if [ ! -f go.mod ]; then
            go mod init go_terminal
          fi
          go mod tidy

      # 🔍 Detect source dir
      - name: Detect source directory
        id: src
        run: |
          if [ -d "./src/go_terminal" ]; then
            echo "dir=src/go_terminal" >> $GITHUB_OUTPUT
          else
            echo "dir=." >> $GITHUB_OUTPUT
          fi

      # 🐧 Build Linux (amd64 + arm64)
      - name: Build Linux
        working-directory: ${{ steps.src.outputs.dir }}
        run: |
          fyne-cross linux -arch=amd64,arm64

      # 🪟 Build Windows (amd64 + arm64)
      - name: Build Windows
        working-directory: ${{ steps.src.outputs.dir }}
        run: |
          fyne-cross windows -arch=amd64,arm64 --app-id com.example.go_terminal

      # 📦 Collect outputs
      - name: Collect artifacts
        run: |
          mkdir -p dist
          find . -type f \( -name "*.exe" -o -name "go_terminal" \) -exec cp {} dist/ \;

      # 📤 Upload
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: go_terminal-binaries
          path: dist/
