name: Build go_terminal (all platforms)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  APP_ID: uk.example.go_terminal
  APP_NAME: go_terminal

jobs:

  # =========================
  # 🐧 WINDOWS + LINUX
  # =========================
  build-linux-windows:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'

      - name: Install fyne-cross
        run: go install github.com/fyne-io/fyne-cross@latest

      - name: Prepare module
        run: |
          if [ ! -f go.mod ]; then
            go mod init go_terminal
          fi
          go mod tidy

      - name: Build Linux
        run: fyne-cross linux -arch=amd64,arm64 --app-id $APP_ID

      - name: Build Windows
        run: fyne-cross windows -arch=amd64,arm64 --app-id $APP_ID

      - name: Package Linux/Windows outputs
        run: |
          mkdir -p dist

          find fyne-cross/dist -type f | while read f; do
            base=$(basename "$f")

            case "$f" in
              *linux-amd64*)   name="${APP_NAME}-linux-amd64" ;;
              *linux-arm64*)   name="${APP_NAME}-linux-arm64" ;;
              *windows-amd64*) name="${APP_NAME}-windows-amd64.exe" ;;
              *windows-arm64*) name="${APP_NAME}-windows-arm64.exe" ;;
              *) continue ;;
            esac

            echo "Copy $f -> dist/$name"
            cp "$f" "dist/$name"
          done

      - name: Create ZIP (linux/windows)
        run: |
          cd dist
          zip -r ../linux-windows-binaries.zip .

      - name: Upload artifact (linux/windows)
        uses: actions/upload-artifact@v4
        with:
          name: linux-windows
          path: linux-windows-binaries.zip


  # =========================
  # 🍎 MACOS (native build)
  # =========================
  
  # =========================
  # 📦 FINAL COMBINED ARTIFACT
  # =========================
  bundle-all:
    needs: [build-linux-windows, build-macos]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all

      - name: Merge everything
        run: |
          mkdir -p final
          find all -type f -name "*.zip" -exec cp {} final/ \;

      - name: Upload unified bundle
        uses: actions/upload-artifact@v4
        with:
          name: go_terminal-all-platforms
          path: final/
